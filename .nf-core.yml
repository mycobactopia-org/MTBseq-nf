lint:
  files_exist:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-mtbseqnf_logo_light.png
    - docs/images/nf-core-mtbseqnf_logo_light.png
    - docs/images/nf-core-mtbseqnf_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/ISSUE_TEMPLATE/feature_request.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - .github/CONTRIBUTING.md
    - .github/.dockstore.yml
    - .gitignore
    - .github/workflows/branch.yml
    - .github/workflows/ci.yml
    - .github/workflows/linting_comment.yml
    - .github/workflows/linting.yml
    - conf/igenomes.config
  files_unchanged:
    - CODE_OF_CONDUCT.md
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/ISSUE_TEMPLATE/feature_request.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - .github/workflows/branch.yml
    - .github/workflows/linting_comment.yml
    - .github/workflows/linting.yml
    - .github/CONTRIBUTING.md
    - .github/.dockstore.yml
  multiqc_config:
    - report_comment
  nextflow_config:
    - manifest.name
    - manifest.homePage
  readme:
    - nextflow_badge
nf_core_version: 4.0.2
repository_type: pipeline
template:
  author: Abhinav Sharma (@abhi18av) and Davi Marcon (@mxrcon)
  description: MTBseq-nf pipeline makes MTBseq simple and easy to use via Nextflow
  force: false
  is_nfcore: false
  name: mtbseqnf
  org: mycobactopia-org
  outdir: .
  skip_features:
    - github
    - ci
    - github_badges
    - igenomes
  version: "1.0"
